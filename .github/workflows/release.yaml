name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CXX: g++-14
  CC: gcc-14

jobs:
  release-linux:
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/${{ github.repository }}/ci:latest
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Build release
        run: make release

      - name: Run tests
        run: make test

      - name: Package
        run: |
          mkdir -p dist
          cp cmake-build-release/ui/bit_bridge dist/bit_bridge-linux-${{ matrix.arch }}
          cp cmake-build-release/core/bit_bridge_lb dist/bit_bridge_lb-linux-${{ matrix.arch }}
          cp bitbridge-settings.toml dist/
          tar -czf bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}
          path: bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz

      - name: Upload LB binary for Docker
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7
        with:
          name: lb-binary-${{ matrix.arch }}
          path: |
            cmake-build-release/core/bit_bridge_lb
            /usr/lib/x86_64-linux-gnu/libyaml-cpp.so*

      - name: Upload LB binary for Docker
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v7
        with:
          name: lb-binary-${{ matrix.arch }}
          path: |
            cmake-build-release/core/bit_bridge_lb
            /usr/lib/aarch64-linux-gnu/libyaml-cpp.so*

  docker:
    needs: release-linux
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Download LB binary
        uses: actions/download-artifact@v8
        with:
          name: lb-binary-${{ matrix.arch }}
          path: .docker/context/

      - name: Prepare Docker context
        run: |
          cp .docker/context/cmake-build-release/core/bit_bridge_lb .docker/context/bit_bridge_lb
          chmod +x .docker/context/bit_bridge_lb
          find .docker/context/ -name 'libyaml-cpp.so*' -exec cp {} .docker/context/ \;

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG=ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.arch }}
          docker build -f .docker/runtime.Dockerfile -t "$TAG" .docker/context/
          docker push "$TAG"

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          REPO=ghcr.io/${{ github.repository }}
          TAG=${{ github.ref_name }}
          docker manifest create "$REPO:$TAG" \
            "$REPO:$TAG-amd64" \
            "$REPO:$TAG-arm64"
          docker manifest push "$REPO:$TAG"
          docker manifest create "$REPO:latest" \
            "$REPO:$TAG-amd64" \
            "$REPO:$TAG-arm64"
          docker manifest push "$REPO:latest"

  github-release:
    needs: release-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix=bit-bridge-${{ github.ref_name }}/ -o bit-bridge-${{ github.ref_name }}-source.tar.gz HEAD
          git archive --format=zip --prefix=bit-bridge-${{ github.ref_name }}/ -o bit-bridge-${{ github.ref_name }}-source.zip HEAD

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bit-bridge-${{ github.ref_name }}-linux-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bit-bridge-${{ github.ref_name }}-linux-*.tar.gz
            bit-bridge-${{ github.ref_name }}-source.tar.gz
            bit-bridge-${{ github.ref_name }}-source.zip
          generate_release_notes: true