name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/${{ github.repository }}/ci:latest
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Build release
        run: make release

      - name: Run tests
        run: make test

      - name: Package
        run: |
          mkdir -p dist
          cp cmake-build-release/ui/bit_bridge dist/bit_bridge-linux-${{ matrix.arch }}
          cp cmake-build-release/core/bit_bridge_lb dist/bit_bridge_lb-linux-${{ matrix.arch }}
          cp bitbridge-settings.toml dist/
          tar -czf bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}
          path: bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz

  github-release:
    needs: release-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bit-bridge-${{ github.ref_name }}-linux-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bit-bridge-${{ github.ref_name }}-linux-*.tar.gz
          generate_release_notes: true