name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: ghcr.io/${{ github.repository }}
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci:latest
  CXX: g++-14
  CC: gcc-14

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE }} \
            sh -c "make release && make test"

      - name: Package release archive
        run: |
          mkdir -p dist
          cp cmake-build-release/ui/bit_bridge dist/bit_bridge-linux-${{ matrix.arch }}
          cp cmake-build-release/core/bit_bridge_lb dist/bit_bridge_lb-linux-${{ matrix.arch }}
          cp bitbridge-settings.toml dist/
          tar -czf bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}
          path: bit-bridge-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: default

      - name: Build and push Docker image by digest
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/runtime.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ github.ref_name }}-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.docker.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          TAG=${{ github.ref_name }}
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:$TAG \
            -t ${{ env.IMAGE }}:latest \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix=bit-bridge-${{ github.ref_name }}/ -o bit-bridge-${{ github.ref_name }}-source.tar.gz HEAD
          git archive --format=zip --prefix=bit-bridge-${{ github.ref_name }}/ -o bit-bridge-${{ github.ref_name }}-source.zip HEAD

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bit-bridge-${{ github.ref_name }}-linux-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bit-bridge-${{ github.ref_name }}-linux-*.tar.gz
            bit-bridge-${{ github.ref_name }}-source.tar.gz
            bit-bridge-${{ github.ref_name }}-source.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}