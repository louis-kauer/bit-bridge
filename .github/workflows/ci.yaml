name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/cmake/tomlplusplus
          key: tomlplusplus-${{ runner.os }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev libgtest-dev clang-tidy cmake build-essential

      - name: Install tomlplusplus
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus
          cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build
          sudo cmake --install build

      - name: Build all targets
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: cmake-build-debug/
          retention-days: 1

  test-lib:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev libgtest-dev cmake build-essential
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build
        run: make build

      - name: Run lib tests
        run: make test-lib

  test-core:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev libgtest-dev cmake build-essential
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build
        run: make build

      - name: Run core tests
        run: make test-core

  build-ui:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev cmake build-essential
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build UI
        run: make build-ui

  build-lb:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential

      - name: Build LB
        run: make build-lb

  asan:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev libgtest-dev cmake build-essential
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Run ASan tests
        run: make test-asan

  lint:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev clang-tidy cmake build-essential
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Lint
        run: make lint