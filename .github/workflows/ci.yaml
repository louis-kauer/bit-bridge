name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CXX: g++-14

jobs:
  build-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential

      - name: Build lib
        run: make build-lib

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v3.4.0 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build UI
        run: make build-ui

  build-lb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential

      - name: Build LB
        run: make build-lb

  test-lib:
    needs: build-lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build
        run: make build

      - name: Run lib tests
        run: make test-lib

  test-core:
    needs: build-lb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build
        run: make build

      - name: Run core tests
        run: make test-core

  asan:
    needs: [build-lib, build-lb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Run ASan tests
        run: make test-asan

  lint:
    needs: [build-lib, build-ui, build-lb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/keyrings/llvm.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev clang-tidy-19 cmake build-essential
          sudo ln -sf /usr/bin/clang-tidy-19 /usr/bin/clang-tidy
          git clone --depth 1 --branch v3.4.0 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Lint
        run: make lint