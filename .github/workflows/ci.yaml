name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev clang-tidy cmake build-essential

      - name: Install tomlplusplus
        run: |
          git clone --depth 1 --branch v3.4.0 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Install googletest
        run: |
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build all targets
        run: make build

  test-lib:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build
        run: make build

      - name: Run lib tests
        run: make test-lib

  test-core:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build
        run: make build

      - name: Run core tests
        run: make test-core

  build-ui:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v3.4.0 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Build UI
        run: make build-ui

  build-lb:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential

      - name: Build LB
        run: make build-lb

  asan:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-cpp-dev cmake build-essential
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git /tmp/googletest
          cd /tmp/googletest && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Run ASan tests
        run: make test-asan

  lint:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwxgtk3.2-dev libyaml-cpp-dev clang-tidy cmake build-essential
          git clone --depth 1 --branch v3.4.0 https://github.com/marzer/tomlplusplus.git /tmp/tomlplusplus
          cd /tmp/tomlplusplus && cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local && cmake --build build && sudo cmake --install build

      - name: Lint
        run: make lint