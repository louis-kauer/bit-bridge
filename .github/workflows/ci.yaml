name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CXX: g++-14
  CC: gcc-14

jobs:
  build-lib:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build-lib

  build-ui:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build-ui

  build-lb:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build-lb

  test-lib:
    needs: build-lib
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build
      - run: make test-lib

  test-core:
    needs: build-lb
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build
      - run: make test-core

  asan:
    needs: [build-lib, build-lb]
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make test-asan

  lint:
    needs: [build-lib, build-ui, build-lb]
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make lint

  bench:
    needs: build-lb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            engine:
              - 'core/**'
              - 'bench/**'
      - if: steps.filter.outputs.engine == 'true' && github.event_name == 'pull_request'
        run: make bench-cpp-compare
      - if: steps.filter.outputs.engine == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: make bench-cpp-update
      - if: steps.filter.outputs.engine == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baseline.json
          git diff --cached --quiet || git commit -m "chore(bench): update baseline [skip ci]"
          git push