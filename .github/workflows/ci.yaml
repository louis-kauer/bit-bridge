name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CXX: g++-14
  CC: gcc-14

jobs:
  build-lib:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build-lib

  build-ui:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build-ui

  build-lb:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build-lb

  test-lib:
    needs: build-lib
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build
      - run: make test-lib

  test-core:
    needs: build-lb
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make build
      - run: make test-core

  asan:
    needs: [build-lib, build-lb]
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make test-asan

  lint:
    needs: [build-lib, build-ui, build-lb]
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v6
      - run: make lint